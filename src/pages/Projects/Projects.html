<section class="projects-page">
  <div class="d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3 mb-4">
    <div>
      <span class="tb-eyebrow mb-2"><i class="bi bi-folder2-open"></i> Projects</span>
      <h1 class="projects-page__title mt-2 mb-1">Your projects</h1>
      <p class="text-soft mb-0">Manage boards, stages and tasks.</p>
    </div>
    <a href="/project/add" data-router-link class="btn btn-gradient align-self-start">
      <i class="bi bi-plus-lg me-1"></i> Add project
    </a>
  </div>

  <div class="projects-page__loading text-soft mb-4 d-none" data-projects-loading>
    <span class="spinner-border spinner-border-sm me-2"></span>Loading projects…
  </div>

  <div class="card projects-table-wrap d-none" data-projects-table-wrap>
    <div class="table-responsive">
      <table class="table projects-table align-middle mb-0">
        <thead>
          <tr>
            <th scope="col">Title</th>
            <th scope="col">Description</th>
            <th scope="col" class="text-center">Stages</th>
            <th scope="col" class="text-center">Open Tasks</th>
            <th scope="col" class="text-center">Tasks Done</th>
            <th scope="col" class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody data-projects-tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card p-5 text-center d-none" data-projects-empty>
    <div class="projects-page__empty-icon mb-3">
      <i class="bi bi-folder-plus"></i>
    </div>
    <h2 class="h5 mb-2">No projects yet</h2>
    <p class="text-soft mb-4">Create your first project to start organizing tasks.</p>
    <a href="/project/add" data-router-link class="btn btn-gradient">
      <i class="bi bi-plus-lg me-1"></i> Add project
    </a>
  </div>
</section>
