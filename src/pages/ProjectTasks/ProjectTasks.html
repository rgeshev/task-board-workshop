<section class="project-tasks-page">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb mb-0">
      <li class="breadcrumb-item"><a href="/projects" data-router-link>Projects</a></li>
      <li class="breadcrumb-item active" aria-current="page" data-project-breadcrumb>Tasks</li>
    </ol>
  </nav>

  <div class="project-tasks-page__header d-flex flex-column flex-sm-row justify-content-between align-items-sm-center gap-3">
    <div>
      <h1 class="project-tasks-page__title mb-1">
        <span data-project-title class="text-gradient">Tasks</span>
      </h1>
      <p class="text-soft mb-0">Drag tasks between columns or reorder them within a stage.</p>
    </div>
    <button type="button" class="btn btn-gradient align-self-start" data-add-task>
      <i class="bi bi-plus-lg me-1"></i> Add task
    </button>
  </div>

  <div class="project-tasks-page__loading text-soft mb-4 d-none" data-board-loading>
    <span class="spinner-border spinner-border-sm me-2"></span>Loading board…
  </div>

  <div class="board-scroll d-none" data-board-scroll>
    <div class="board" data-board></div>
  </div>

  <div class="card p-5 text-center d-none" data-board-empty>
    <h2 class="h5 mb-2">No stages found</h2>
    <p class="text-soft mb-0">This project has no stages to display tasks.</p>
  </div>
</section>
