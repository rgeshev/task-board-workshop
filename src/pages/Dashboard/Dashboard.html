<section class="dashboard-page">
  <div class="mb-4">
    <span class="tb-eyebrow mb-2"><i class="bi bi-grid-1x2"></i> Dashboard</span>
    <h1 class="dashboard-page__title mt-2 mb-1">Welcome back</h1>
    <p class="text-soft mb-0">Your workspace at a glance.</p>
  </div>

  <div class="row g-4" data-dashboard-stats>
    <div class="col-md-6 col-xl-4">
      <a href="/projects" data-router-link class="card tb-hover dashboard-stat h-100 p-4 text-decoration-none">
        <div class="dashboard-stat__icon" style="--icon: var(--tb-violet)">
          <i class="bi bi-folder2-open"></i>
        </div>
        <p class="dashboard-stat__label text-soft mb-1">Projects</p>
        <p class="dashboard-stat__value mb-2" data-stat-projects>—</p>
        <span class="dashboard-stat__link">
          View all projects <i class="bi bi-arrow-right"></i>
        </span>
      </a>
    </div>

    <div class="col-md-6 col-xl-4">
      <div class="card dashboard-stat h-100 p-4">
        <div class="dashboard-stat__icon" style="--icon: var(--tb-amber)">
          <i class="bi bi-circle"></i>
        </div>
        <p class="dashboard-stat__label text-soft mb-1">Open tasks</p>
        <p class="dashboard-stat__value mb-0" data-stat-open>—</p>
      </div>
    </div>

    <div class="col-md-6 col-xl-4">
      <div class="card dashboard-stat h-100 p-4">
        <div class="dashboard-stat__icon" style="--icon: var(--tb-green)">
          <i class="bi bi-check-circle"></i>
        </div>
        <p class="dashboard-stat__label text-soft mb-1">Done tasks</p>
        <p class="dashboard-stat__value mb-0" data-stat-done>—</p>
      </div>
    </div>
  </div>

  <div class="dashboard-page__loading text-soft mt-4 d-none" data-dashboard-loading>
    <span class="spinner-border spinner-border-sm me-2"></span>Loading your stats…
  </div>
</section>
