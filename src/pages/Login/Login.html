<section class="login-page">
  <div class="row justify-content-center align-items-center g-5">
    <div class="col-lg-5 d-none d-lg-block">
      <span class="tb-eyebrow mb-4">
        <i class="bi bi-stars"></i>
        <span data-login-side-eyebrow>Welcome back</span>
      </span>
      <h1 class="login-page__headline">
        <span data-login-side-title>Pick up right where you</span>
        <span class="text-gradient" data-login-side-highlight>left off</span>
      </h1>
      <p class="text-soft fs-5 mb-4" data-login-side-text>
        Sign in to open your boards, move tasks across stages and keep your
        projects flowing.
      </p>
      <ul class="login-page__perks">
        <li><i class="bi bi-check-circle-fill"></i> All your projects in one place</li>
        <li><i class="bi bi-check-circle-fill"></i> Visual progress at a glance</li>
        <li><i class="bi bi-check-circle-fill"></i> Private and secure by default</li>
      </ul>
    </div>

    <div class="col-md-8 col-lg-5">
      <div class="card p-4 p-sm-5">
        <div class="text-center mb-4">
          <span class="login-page__logo"><i class="bi bi-kanban-fill"></i></span>
          <h2 class="h4 mt-3 mb-1" data-form-title>Login to your account</h2>
          <p class="text-soft small mb-0" data-form-subtitle>Manage your projects in seconds</p>
        </div>

        <div class="login-page__tabs mb-4" role="tablist">
          <button type="button" class="login-page__tab active" data-mode="login" role="tab" aria-selected="true">
            Login
          </button>
          <button type="button" class="login-page__tab" data-mode="register" role="tab" aria-selected="false">
            Register
          </button>
        </div>

        <form data-login-form novalidate>
          <div class="mb-3">
            <label class="form-label small text-soft" for="login-email">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input
                type="email"
                class="form-control"
                id="login-email"
                name="email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label small text-soft" for="login-password">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="login-password"
                name="password"
                placeholder="••••••••"
                required
                minlength="6"
                autocomplete="current-password"
              />
            </div>
          </div>
          <button type="submit" class="btn btn-gradient w-100 btn-lg" data-submit-btn>
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Login to manage your projects
          </button>
        </form>

        <form class="d-none" data-register-form novalidate>
          <div class="mb-3">
            <label class="form-label small text-soft" for="register-email">Email</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input
                type="email"
                class="form-control"
                id="register-email"
                name="email"
                placeholder="you@example.com"
                required
                autocomplete="email"
              />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small text-soft" for="register-password">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="register-password"
                name="password"
                placeholder="At least 6 characters"
                required
                minlength="6"
                autocomplete="new-password"
              />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label small text-soft" for="register-confirm">Confirm password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
              <input
                type="password"
                class="form-control"
                id="register-confirm"
                name="confirm"
                placeholder="Repeat password"
                required
                minlength="6"
                autocomplete="new-password"
              />
            </div>
          </div>
          <button type="submit" class="btn btn-gradient w-100 btn-lg" data-submit-btn>
            <i class="bi bi-person-plus me-2"></i>
            Create your account
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
